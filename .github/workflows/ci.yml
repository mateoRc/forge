name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build and test
        run: docker build --target test .

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build versioned runtime image
        run: |
          docker build \
            --build-arg VERSION="${GITHUB_SHA}" \
            --tag "ghcr.io/mateorc/forge:${GITHUB_SHA}" \
            .

      - name: Publish immutable runtime image
        if: github.event_name == 'push'
        run: docker push "ghcr.io/mateorc/forge:${GITHUB_SHA}"
